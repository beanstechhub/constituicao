name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: detector-py/requirements.txt
      - name: Install dependencies
        run: pip install -r detector-py/requirements.txt pytest
      - name: Run tests
        run: cd detector-py && PYTHONPATH=. pytest tests/ -v --tb=short

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run fraud-shield tests (with race detector)
        run: cd fraud-shield && go test -race ./... -v -count=1
      - name: Run benchmarks
        run: cd fraud-shield && go test -run=^$ -bench=. -benchmem -count=1
      - name: Build gateway
        run: cd api-go && go build ./...
